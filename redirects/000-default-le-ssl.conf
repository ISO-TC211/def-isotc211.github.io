<VirtualHost *:443>
        ServerAdmin nick@kurrawong.ai
        DocumentRoot /var/www/html

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        SetEnvIf Request_URI "^/favicon\.ico$" dontlog
        CustomLog /var/log/apache2/access.log combined env=!dontlog

        RewriteEngine  on

        RewriteRule ^/codesets$             https://defs.opengis.net/prez/catalogs/ogc-cat:hosted/col/defisotc211org:codesets [L]
        RewriteRule ^/codeset/(.*)$         "https://defs.opengis.net/prez/object?iri=https://def.isotc211.org/common/$1" [L]

        # Legacy
        RewriteRule ^/common$               https://defs.opengis.net/prez/catalogs/ogc-cat:hosted/col/defisotc211org:codesets/it1/defisotc211org:common [L]
        RewriteRule ^/common/(.*)$          "https://defs.opengis.net/prez/object?iri=https://def.isotc211.org/common/$1" [L]
        # End Legacy
        RewriteRule ^/ont/(.*)$             /ont.html [L]


        # SSL Engine
        SSLEngine on

        # Certificate files (as set up by certbot)
        SSLCertificateFile      /etc/letsencrypt/live/def.isotc211.org/fullchain.pem
        SSLCertificateKeyFile   /etc/letsencrypt/live/def.isotc211.org/privkey.pem
</VirtualHost>
