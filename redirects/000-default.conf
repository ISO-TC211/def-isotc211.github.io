<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        SetEnvIf Request_URI "^/favicon\.ico$" dontlog
        CustomLog /var/log/apache2/access.log combined env=!dontlog

        RewriteEngine  on

        RewriteRule ^/codesets$             https://defs.opengis.net/prez/catalogs/ogc-cat:hosted/col/defisotc211org:codesets [L]
        RewriteRule ^/codeset/(.*)$         "https://defs.opengis.net/prez/object?iri=https://def.isotc211.org/codeset/$1" [L]

        # Legacy
        RewriteRule ^/common$               https://defs.opengis.net/prez/catalogs/ogc-cat:hosted/col/defisotc211org:codesets/it1/defisotc211org:common [L]
        RewriteRule ^/common/(.*)$          "https://defs.opengis.net/prez/object?iri=https://def.isotc211.org/codeset/$1" [L]
        # End Legacy

        RewriteRule ^/ont/(.*)$             /ont.html [L]
</VirtualHost>